services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: api
        PORT: 3111
    image: seoul-moment-api:dev
    container_name: seoul-moment-api-dev
    restart: unless-stopped
    env_file:
      - /opt/seoul-moment/.env.dev
    environment:
      - TZ=Asia/Seoul
    ports:
      - '3111:3111'
    networks:
      - app
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3111/docs >/dev/null || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

networks:
  app:
    external: true
